# Nginx reverse proxy for the FastAPI backend on the Python server.
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/.
#
# MULTI-PLATFORM: Uses a unique server_name and does NOT conflict with
# other Nginx server blocks on the same machine. If you don't use Nginx
# on the Python server, this file is optional — the PHP app talks
# directly to FastAPI on its port.

upstream comparison_fastapi_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    # Use a dedicated hostname or the server IP.
    # Do NOT use 'default_server' to avoid hijacking other vhosts.
    server_name comparison-api.internal;

    client_max_body_size 500M;

    location / {
        proxy_pass http://comparison_fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
