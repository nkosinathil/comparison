<VirtualHost *:80>
    ServerName 192.168.1.66
    DocumentRoot /var/www/gismartanalytics/public

    <Directory /var/www/gismartanalytics/public>
        AllowOverride All
        Require all granted

        # URL rewriting (also handled by .htaccess)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # PHP-FPM proxy
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.1-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Upload size (500 MB)
    LimitRequestBody 524288000

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    ErrorLog ${APACHE_LOG_DIR}/comparison-error.log
    CustomLog ${APACHE_LOG_DIR}/comparison-access.log combined
</VirtualHost>
